<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RNC Impressão v3</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>RNC Impressão v3</h1>
      <p>Sistema operacional para produção, qualidade, máquinas, equipas e trabalhadores.</p>
    </section>

    <nav class="nav">
      <button data-view="dashboard">Dashboard</button>
      <button data-view="production">Produção</button>
      <button data-view="structure">Estrutura</button>
      <button data-view="profiles">Fichas</button>
      <button data-view="stats">Estatística</button>
      <button data-view="data">Dados</button>
      <button data-view="ai">IA</button>
    </nav>

    <section id="dashboard" class="view active"></section>
    <section id="production" class="view"></section>
    <section id="structure" class="view"></section>
    <section id="profiles" class="view"></section>
    <section id="stats" class="view"></section>
    <section id="data" class="view"></section>
    <section id="ai" class="view"></section>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
